<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOQCL — Welcome to Leonida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#ffb347;
    --orange:#ff7a4d;
    --pink:#ff4d94;
    --magenta:#d946a8;
    --deep:#3a1240;
    --ink:#120a1a;
    --glass:rgba(255,255,255,0.07);
    --glass-border:rgba(255,255,255,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--ink);
    font-family:'Barlow',sans-serif;
  }
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(255,179,71,0.35), transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(217,70,168,0.4), transparent 55%),
      linear-gradient(135deg, var(--deep) 0%, #5a1a4a 35%, #a3315a 65%, #ff7a4d 100%);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .vignette{
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }

  .horizon{
    position:absolute;
    bottom:0; left:0; right:0;
    height:18vh;
    background:linear-gradient(to top, rgba(10,4,14,0.9), transparent);
  }

  .sun{
    position:absolute;
    left:50%;
    top:54%;
    transform:translate(-50%,-50%);
    width:min(45vw, 45vh);
    height:min(45vw, 45vh);
    border-radius:50%;
    background:linear-gradient(180deg, var(--gold) 0%, var(--orange) 45%, var(--pink) 75%, var(--magenta) 100%);
    filter:blur(2px);
    opacity:0.55;
    box-shadow:0 0 12vw 4vw rgba(255,122,77,0.35);
  }
  .sun-lines{
    position:absolute;
    left:50%;
    top:54%;
    transform:translate(-50%,-50%);
    width:min(45vw, 45vh);
    height:min(45vw, 45vh);
  }
  .sun-lines div{
    position:absolute;
    left:0; right:0;
    height:0.5vh;
    background:var(--ink);
    opacity:0.5;
  }

  .card{
    position:relative;
    z-index:5;
    width:min(85vw, 1180px);
    padding:5vh 5vw;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:28px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 40px 100px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    text-align:center;
  }

  .eyebrow{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    letter-spacing:0.5em;
    font-size:clamp(12px, 1.2vw, 22px);
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:1.5vh;
  }

  h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:900;
    font-style:italic;
    font-size:clamp(48px, 9vw, 172px);
    line-height:0.9;
    letter-spacing:0.01em;
    background:linear-gradient(90deg, var(--gold), var(--orange) 40%, var(--pink) 70%, var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 10px 60px rgba(255,77,148,0.25);
    text-transform:uppercase;
  }

  h1 span{
    display:block;
    font-size:clamp(28px, 5vw, 96px);
    font-weight:800;
    -webkit-text-fill-color:#fff;
    color:#fff;
    letter-spacing:0.08em;
    margin-top:0.2em;
  }

  .divider{
    width:min(10vw, 140px);
    height:5px;
    margin:3vh auto;
    border-radius:4px;
    background:linear-gradient(90deg, var(--gold), var(--pink));
  }

  .sub{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:500;
    font-size:clamp(16px, 1.8vw, 34px);
    letter-spacing:0.06em;
    color:rgba(255,255,255,0.88);
  }

  .tagline{
    margin-top:1.2vh;
    font-size:clamp(10px, 1vw, 20px);
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.55);
    font-weight:600;
  }

  .badge{
    position:absolute;
    top:4vh;
    right:4vw;
    z-index:6;
    display:flex;
    align-items:center;
    gap:0.8vw;
    padding:1vh 1.5vw;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:100px;
    backdrop-filter:blur(14px);
  }
  .badge .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--pink);
    box-shadow:0 0 14px var(--pink);
  }
  .badge span{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    letter-spacing:0.15em;
    font-size:clamp(11px, 1.1vw, 22px);
    color:#fff;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .corner-mark{
    position:absolute;
    left:4vw;
    top:4vh;
    z-index:6;
    font-family:'Barlow Condensed', sans-serif;
    font-weight:800;
    font-size:clamp(16px, 1.6vw, 30px);
    letter-spacing:0.15em;
    color:rgba(255,255,255,0.85);
    text-transform:uppercase;
  }
  .corner-mark small{
    display:block;
    font-size:clamp(9px, 0.85vw, 16px);
    font-weight:500;
    letter-spacing:0.35em;
    color:rgba(255,255,255,0.5);
    margin-top:4px;
  }

  @media (max-width: 700px){
    .badge span{display:none;}
    .badge{padding:1vh 1vh;}
  }
</style>
</head>
<body>

<iframe src="https://embed.cx/embed1/" width="1920" height="1080" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" scrolling="no"></iframe>
  
  <div class="stage">
    <div class="sun"></div>
    <div class="sun-lines" id="sunLines"></div>
    <div class="vignette"></div>
    <div class="horizon"></div>

    <div class="corner-mark">VOQCL<small>Broadcast</small></div>
    <div class="badge"><div class="dot"></div><span>Live from Leonida</span></div>

    <div class="card">
      <div class="eyebrow">GTA VI Fan Coverage</div>
      <h1>Welcome<span>to Leonida</span></h1>
      <div class="divider"></div>
      <div class="sub">The unofficial home for everything Vice City</div>
      <div class="tagline">vocql.github.io / leonida</div>
    </div>
  </div>



<script>
  const wrap = document.getElementById('sunLines');
  const count = 9;
  for(let i=0;i<count;i++){
    const y = (47 + i * 5.3) + '%';
    const bar = document.createElement('div');
    bar.style.top = y;
    bar.style.height = (0.4 + i*0.15) + 'vh';
    wrap.appendChild(bar);
  }
</script>
</body>
</html>
